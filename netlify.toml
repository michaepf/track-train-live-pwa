[build]
  command   = "npm run build"
  publish   = "dist"

# Serve the web app manifest with the correct MIME type so Chrome
# recognises the PWA and enables the "Add to Home Screen" prompt.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# SPA fallback — all routes serve index.html so React Router can handle them.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
